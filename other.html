<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3. Other Page</title>
    <link rel="stylesheet" href="./css/style.css"/>
</head>
<body>
    <!-- A simple web page to demonstrate navigation between static web pages using href -->
    <!-- By using the same classes and formatting, I can ensure the formatting remains consistent between pages without writing additional CSS -->
    <!-- Fulfills the requirement of having a second .html file -->
    <header class="title">
        <h1>You've reached the other web page!</h1>
    </header>
    <section class="text-block">
        <p>
            <a href="index.html" title="Navigates to the home page.">Please click here to return to the previous page.</a>
        </p>
    </section>
</body>
</html>
